server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-lived cache for Vite's hashed assets (safe — filenames change on rebuild)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the entry point or service worker — PWA must always check for updates
    location ~* ^/(index\.html|sw\.js)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SPA fallback — all unknown paths serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
